<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUFF</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', Arial, sans-serif;
        }
        
        .ruff-text {
            font-size: 15vw;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-align: center;
            text-transform: uppercase;
            margin: 0 0 30px 0;
            padding: 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .ruff-image {
            max-width: 80%;
            max-height: 50vh;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        /* Bigger text on large screens */
        @media (min-width: 768px) {
            .ruff-text {
                font-size: 12rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="ruff-text">RUFF</h1>
    
    <!-- Replace this URL with your image -->
    <img src="https://via.placeholder.com/800x600/111111/ffffff?text=Your+Image+Here" 
         alt="RUFF" 
         class="ruff-image">
</body>
</html>
